services:
  - type: web
    name: travellerhero-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
```

Third, add `gunicorn` to your requirements since Render uses it instead of the Flask dev server:
```
pip install gunicorn
pip freeze > requirements.txt
```

Commit and push both files to GitHub before continuing.

---

**Step 2 — Create Render account and connect GitHub**

Go to `render.com` and sign up with your GitHub account. Click "Authorize Render" when prompted so Render can read your repositories.

---

**Step 3 — Create a new Web Service on Render**

Click the purple "New" button in the top right then click "Web Service". Select "Build and deploy from a Git repository". Find your repository in the list and click Connect.

Fill in the settings form exactly as follows:

| Field | Value |
|---|---|
| Name | travellerhero-backend |
| Region | Pick closest to you |
| Branch | main |
| Root Directory | server |
| Runtime | Python 3 |
| Build Command | `pip install -r requirements.txt` |
| Start Command | `gunicorn app:app` |
| Instance Type | Free |

---

**Step 4 — Add environment variables to Render**

Scroll down on the same page to the "Environment Variables" section. Add every key from your `server/.env` file one by one. Do not upload the `.env` file itself. Add these manually:
```
SMTP_USER
SMTP_PASS
SMTP_SENDER_EMAIL
SMTP_HOST
SMTP_PORT
FEEDBACK_RECEIVER_EMAIL
NVIDIA_API_KEY
TAVILY_API_KEY
AMADEUS_API_KEY
PLANNER_MODE        ← set this to "live" for production
```

---

**Step 5 — Deploy**

Click "Create Web Service". Render will pull your code and deploy it. This takes 3 to 5 minutes the first time. Watch the logs in the Render dashboard. You will see the same startup messages you see locally including `--- BACKEND INSTANCE STARTED ---`.

Once deployed Render gives you a URL like:
```
https://travellerhero-backend.onrender.com
```

Copy this URL — you need it for the frontend deployment.

**Important:** Free tier Render services spin down after 15 minutes of inactivity. The first request after spindown takes 30 to 60 seconds to respond. This is normal on the free tier.

---

### Part 2 — Deploy Frontend to Vercel

**Step 1 — Prepare your frontend**

Make sure your `client/.env` file is NOT committed to GitHub. Open `.gitignore` in the client folder and confirm `.env` is listed. If it is not, add it and push.

Also confirm your `client/vite.config.ts` has no hardcoded localhost URLs anywhere.

---

**Step 2 — Create Vercel account**

Go to `vercel.com` and sign up with your GitHub account. Click "Authorize Vercel" when prompted.

---

**Step 3 — Import your project**

Click "Add New" then "Project". Find your repository and click Import.

Fill in the settings form exactly as follows:

| Field | Value |
|---|---|
| Framework Preset | Vite |
| Root Directory | client |
| Build Command | `npm run build` |
| Output Directory | dist |
| Install Command | `npm install` |

---

**Step 4 — Add environment variables to Vercel**

Before clicking deploy, scroll down to the "Environment Variables" section. Add one variable:
```
VITE_API_URL = https://travellerhero-backend.onrender.com
```

This is the Render URL from Part 1 Step 5. This is the most important step — without this the frontend will call localhost in production and nothing will work.

---

**Step 5 — Deploy**

Click "Deploy". Vercel builds your React app and deploys it in about 2 minutes. Once done Vercel gives you a URL like:
```
https://travellerhero.vercel.app